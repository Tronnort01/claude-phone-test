name: Build APK

on:
  push:
    branches: [ 'claude/stealth-app-planning-RvjrV', 'claude/stealth-app-merged', 'master' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.txt
          retention-days: 7

      - name: Upload APK (on success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StealthCalc-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Fail if build failed
        run: |
          if grep -q "BUILD FAILED" build-output.txt; then
            echo "Build failed — check build-log artifact for errors"
            exit 1
          fi
