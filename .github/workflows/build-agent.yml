name: Build Agent APK

on:
  push:
    branches: [ 'master', 'claude/**' ]
    paths: [ 'agent/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: agent-gradle-${{ hashFiles('agent/**/*.gradle.kts') }}
          restore-keys: agent-gradle-

      - name: Generate Gradle wrapper
        working-directory: agent
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: agent
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-build-log
          path: agent/build-output.txt
          retention-days: 7

      - name: Upload APK (on success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: StealthAgent-debug
          path: agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Fail if build failed
        working-directory: agent
        run: |
          if grep -q "BUILD FAILED" build-output.txt; then
            echo "Build failed — check agent-build-log artifact for errors"
            exit 1
          fi
